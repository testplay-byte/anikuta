name: Build APK

on:
  push:
    branches: [main, feature/dev]
    paths:
      - 'app/**'
      - 'core/**'
      - 'data/**'
      - 'domain/**'
      - 'source-api/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK (arm64-v8a)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties', '**/*.gradle.kts') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: anikuta-debug-arm64-v8a
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 90
          if-no-files-found: error

      - name: Notify ntfy.sh
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            ICON="✅"
            TITLE="ANI-KUTA build succeeded"
          else
            ICON="❌"
            TITLE="ANI-KUTA build FAILED"
          fi
          curl -H "Title: $TITLE" \
               -H "Tags: $ICON,android" \
               -H "Click: https://github.com/testplay-byte/anikuta/actions/runs/${{ github.run_id }}" \
               -d "Branch: ${{ github.ref_name }} | Commit: ${{ github.sha }} | Status: $STATUS" \
               https://ntfy.sh/TASKISDONE || true
